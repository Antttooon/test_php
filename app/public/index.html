<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title data-i18n="title">Test PHP + MySQL</title>
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
  <header class="lang-switcher">
    <span class="lang-label">Language:</span>
    <a href="?lang=en" id="langEn" class="lang-link" data-i18n="langEn">Engleski</a>
    <span class="lang-sep">|</span>
    <a href="?lang=sr" id="langSr" class="lang-link" data-i18n="langSr">Srpski</a>
  </header>
  <main class="container">
    <h1 data-i18n="h1">Izveštaji o radnom vremenu</h1>
    <p id="periodInfo" class="hint"><span class="muted" data-i18n="periodLoading">Period podataka: učitavanje...</span></p>

    <section class="card">
      <h2 data-i18n="section1Title">1) Vreme po svim radnicima za datum</h2>
      <p class="hint" data-i18n="section1Hint">Nakon izrade izveštaja možete kliknuti na red radnika da odmah otvorite izveštaj #2 za njega.</p>
      <form id="dayForm">
        <label>
          <span data-i18n="date">Datum</span>:
          <input type="date" name="date" required>
        </label>
        <button type="submit" data-i18n="buildReport">Izradi izveštaj</button>
      </form>
      <div id="dayResult" class="result"></div>
    </section>

    <section class="card">
      <h2 data-i18n="section2Title">2) Vreme jednog radnika po danima</h2>
      <p id="workerContext" class="hint muted"></p>
      <form id="workerForm">
        <label>
          <span data-i18n="workerId">ID radnika</span>:
          <input type="text" name="id" maxlength="10" required data-i18n-placeholder="workerIdPlaceholder" placeholder="npr. 0099">
        </label>
        <label>
          <span data-i18n="from">Od</span>:
          <input type="date" name="from" required>
        </label>
        <label>
          <span data-i18n="to">Do</span>:
          <input type="date" name="to" required>
        </label>
        <button type="submit" data-i18n="buildReport">Izradi izveštaj</button>
      </form>
      <div id="workerResult" class="result"></div>
    </section>
  </main>

  <script src="/assets/app.js"></script>
</body>
</html>
