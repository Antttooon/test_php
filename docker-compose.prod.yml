
services:
  nginx:
    ports:
      - "8080:80"
      - "4430:443"
    volumes:
      - ./app:/var/www/html:ro
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot-webroot:/var/www/certbot:ro
