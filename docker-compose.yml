services:
  db:
    image: mysql:8.4
    container_name: testphp_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_php
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./task/test_log_r.sql:/docker-entrypoint-initdb.d/01-test_log_r.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  php:
    build:
      context: ./docker/php
    container_name: testphp_php
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: testphp_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

volumes:
  db_data:
